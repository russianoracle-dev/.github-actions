name: CD Pipeline

on:
  push:
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ========================================
  # Job 1: Production Build
  # ========================================
  production-build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      build-sha: ${{ steps.build.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🏗️ Run production build script
        id: build
        run: |
          bash scripts/build_production.sh
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 📦 Build Python package from clean source
        working-directory: ./build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: 📦 Build npm package from clean source
        working-directory: ./build/npm-package
        run: |
          npm ci
          npm pack
          mv *.tgz ../../semantix-rag-prod.tgz

      - name: Upload production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            build/dist/
            semantix-rag-prod.tgz
          retention-days: 30

      - name: Upload build directory for review
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-directory-debug
          path: build/

  # ========================================
  # Job 2: Staging Deployment
  # ========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: production-build
    if: |
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/heads/release/')
    environment:
      name: staging
      url: https://staging.semantix.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download production artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: ./dist

      - name: 📦 Install production Python package
        run: |
          pip install dist/semantix_rag-*.whl --force-reinstall

      - name: 📦 Install production npm package
        run: |
          npm install -g semantix-rag-prod.tgz

      - name: 🧪 Run smoke tests against staging
        run: |
          echo "Running smoke tests..."
          semantix-rag --version
          semantix-rag status

      - name: 🧪 Run integration tests against staging
        run: |
          pytest tests/integration/ -m integration -v

      - name: ✅ Update staging status badge
        if: success()
        run: |
          echo "Staging deployment successful!"
          echo " deployed_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

  # ========================================
  # Job 3: Pre-Production Validation
  # ========================================
  pre-production-validation:
    name: Pre-Production Validation
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/heads/release/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: 🔍 Verify no AI mentions in release
        run: |
          bash scripts/build_production.sh --verify-only

      - name: 🔍 Verify version consistency
        run: |
          PY_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          NPM_VERSION=$(grep '"version"' npm-package/package.json | sed 's/.*"version": "\(.*\)".*/\1/')

          echo "Python version: $PY_VERSION"
          echo "npm version: $NPM_VERSION"

          if [[ "$PY_VERSION" != "$NPM_VERSION" ]]; then
            echo "❌ Version mismatch!"
            exit 1
          fi
          echo "✅ Versions match"

      - name: 🔍 Verify CHANGELOG updated
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if ! grep -q "\[${VERSION}\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md not updated for version $VERSION"
            exit 1
          fi
          echo "✅ CHANGELOG.md updated"

      - name: 🔍 Verify tests pass
        run: |
          pytest tests/unit tests/integration -v --tb=short -x

      - name: 🔍 Verify PyPI package not published
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if curl -sf "https://pypi.org/pypi/semantix-rag/${VERSION}"; then
            echo "❌ Version $VERSION already published to PyPI!"
            exit 1
          fi
          echo "✅ Version not yet published"

      - name: 🔍 Verify npm package not published
        run: |
          VERSION=$(grep '"version"' npm-package/package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          if npm view @semantix/rag@$VERSION; then
            echo "❌ Version $VERSION already published to npm!"
            exit 1
          fi
          echo "✅ npm version not yet published"

  # ========================================
  # Job 4: Production Deployment (Manual)
  # ========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: pre-production-validation
    if: startsWith(github.ref, 'refs/heads/release/')

    environment:
      name: production
      url: https://pypi.org/project/semantix-rag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Download production artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: ./dist

      - name: 📦 Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install twine
          twine upload dist/* --skip-existing --verbose --verbose

      - name: 📦 Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish semantix-rag-prod.tgz --access public

      - name: 🏷️ Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          gh release create "v${VERSION}" \
            --title "Release v${VERSION}" \
            --notes-file CHANGELOG.md \
            dist/*.whl dist/*.tar.gz || true

      - name: ✅ Verify PyPI installation
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          sleep 60  # Wait for PyPI to index
          pip install semantix-rag==$VERSION --force-reinstall
          echo "✅ PyPI package verified"

      - name: ✅ Verify npm installation
        run: |
          VERSION=$(grep '"version"' npm-package/package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          sleep 60  # Wait for npm to index
          npm install -g @semantix/rag@$VERSION
          echo "✅ npm package verified"

      - name: 🔔 Notify team
        if: success()
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "🎉 Release v${VERSION} deployed to production!"
          echo "PyPI: https://pypi.org/project/semantix-rag/"
          echo "npm: https://www.npmjs.com/package/@semantix/rag"

  # ========================================
  # Job 5: Rollback (on failure)
  # ========================================
  rollback-production:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🔄 Rollback PyPI version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          pip install twine
          echo "⚠️ Rolling back PyPI version $VERSION..."
          twine yank semantix-rag==$VERSION || true

      - name: 🔄 Rollback npm version
        run: |
          VERSION=$(grep '"version"' npm-package/package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          echo "⚠️ Deprecating npm version $VERSION..."
          npm deprecate @semantix/rag@$VERSION "Rolled back due to deployment failure" || true

      - name: 🔄 Create rollback commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git credentials for push
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials

          git revert HEAD --no-edit
          git push origin ${{ github.ref }}

      - name: 🚨 Notify team of rollback
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "🚨 PRODUCTION ROLLBACK TRIGGERED"
          echo "Version: $VERSION"
          echo "Reason: Deployment failed"
