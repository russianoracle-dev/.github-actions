name: PR ↔ Linear Rich Sync

on:
  pull_request:
    types: [opened, closed, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]

env:
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
  SYNC_MARKER: "[auto-sync]"

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Extract Linear ID from PR
  # ═══════════════════════════════════════════════════════════════════
  extract:
    runs-on: ubuntu-latest
    outputs:
      linear_id: ${{ steps.extract.outputs.linear_id }}
      has_linear_id: ${{ steps.extract.outputs.has_linear_id }}
    steps:
      - name: Extract Linear ID
        id: extract
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"

          # Try title first [SMNTX-XX] or (SMNTX-XX)
          LINEAR_ID=$(echo "$TITLE" | grep -oE '\[?[A-Z]+-[0-9]+\]?' | tr -d '[]()' | head -1)

          # Try branch name
          if [ -z "$LINEAR_ID" ]; then
            LINEAR_ID=$(echo "$BRANCH" | grep -oE '^[a-z]+-[0-9]+' | tr '[:lower:]' '[:upper:]' | head -1)
          fi

          if [ -n "$LINEAR_ID" ]; then
            echo "linear_id=$LINEAR_ID" >> $GITHUB_OUTPUT
            echo "has_linear_id=true" >> $GITHUB_OUTPUT
            echo "Found Linear ID: $LINEAR_ID"
          else
            echo "has_linear_id=false" >> $GITHUB_OUTPUT
            echo "No Linear ID found"
          fi

  # ═══════════════════════════════════════════════════════════════════
  # PR Opened → Update Linear with rich info
  # ═══════════════════════════════════════════════════════════════════
  pr-opened:
    needs: extract
    if: |
      github.event.action == 'opened' &&
      needs.extract.outputs.has_linear_id == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-mcp-

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Sync PR to Linear
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model haiku
            --mcp-config /tmp/mcp-config.json
          prompt: |
            # Sync PR to Linear

            A new PR has been opened. Update Linear issue with rich information.

            ## PR Details
            - **Linear ID:** ${{ needs.extract.outputs.linear_id }}
            - **PR Number:** #${{ github.event.pull_request.number }}
            - **PR Title:** ${{ github.event.pull_request.title }}
            - **PR URL:** ${{ github.event.pull_request.html_url }}
            - **Author:** ${{ github.event.pull_request.user.login }}
            - **Branch:** ${{ github.event.pull_request.head.ref }}
            - **Additions:** +${{ github.event.pull_request.additions }}
            - **Deletions:** -${{ github.event.pull_request.deletions }}
            - **Changed Files:** ${{ github.event.pull_request.changed_files }}

            ## Instructions

            1. **Update Status**: Use `mcp__linear-server__update_issue` to set status to "In Review"

            2. **Create Attachment**: Use `mcp__linear-server__create_attachment` to link PR:
               - title: "PR #${{ github.event.pull_request.number }}"
               - url: "${{ github.event.pull_request.html_url }}"
               - subtitle: "${{ github.event.pull_request.title }}"

            3. **Add Comment**: Use `mcp__linear-server__create_comment`:
               ```
               ${{ env.SYNC_MARKER }} PR Created

               **[PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})**

               | Metric | Value |
               |--------|-------|
               | Author | @${{ github.event.pull_request.user.login }} |
               | Branch | `${{ github.event.pull_request.head.ref }}` |
               | Changes | +${{ github.event.pull_request.additions }} / -${{ github.event.pull_request.deletions }} |
               | Files | ${{ github.event.pull_request.changed_files }} |

               Ready for review.
               ```

  # ═══════════════════════════════════════════════════════════════════
  # PR Merged → Update Linear to Done
  # ═══════════════════════════════════════════════════════════════════
  pr-merged:
    needs: extract
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      needs.extract.outputs.has_linear_id == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Sync Merge to Linear
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model haiku
            --mcp-config /tmp/mcp-config.json
          prompt: |
            # Sync PR Merge to Linear

            PR has been merged. Update Linear issue.

            ## Details
            - **Linear ID:** ${{ needs.extract.outputs.linear_id }}
            - **PR Number:** #${{ github.event.pull_request.number }}
            - **Merged By:** ${{ github.event.pull_request.merged_by.login }}
            - **Merge Commit:** ${{ github.event.pull_request.merge_commit_sha }}

            ## Instructions

            1. **Update Status**: Use `mcp__linear-server__update_issue` to set status to "Done"

            2. **Add Comment**: Use `mcp__linear-server__create_comment`:
               ```
               ${{ env.SYNC_MARKER }} PR Merged

               **[PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})** merged by @${{ github.event.pull_request.merged_by.login }}

               Merge commit: `${{ github.event.pull_request.merge_commit_sha }}`

               Implementation complete.
               ```

  # ═══════════════════════════════════════════════════════════════════
  # PR Closed (no merge) → Add comment only
  # ═══════════════════════════════════════════════════════════════════
  pr-closed:
    needs: extract
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false &&
      needs.extract.outputs.has_linear_id == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Notify Linear
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model haiku
            --mcp-config /tmp/mcp-config.json
          prompt: |
            # Notify PR Closed

            PR was closed without merge. Add comment to Linear (do NOT change status).

            ## Details
            - **Linear ID:** ${{ needs.extract.outputs.linear_id }}
            - **PR Number:** #${{ github.event.pull_request.number }}

            ## Instructions

            Add comment using `mcp__linear-server__create_comment`:
            ```
            ${{ env.SYNC_MARKER }} PR Closed

            **[PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})** closed without merge.

            The implementation may need to be revised.
            ```

            Do NOT update the issue status - it remains in current state.

  # ═══════════════════════════════════════════════════════════════════
  # Review Submitted → Notify Linear
  # ═══════════════════════════════════════════════════════════════════
  review-submitted:
    needs: extract
    if: |
      github.event_name == 'pull_request_review' &&
      needs.extract.outputs.has_linear_id == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Notify Linear
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model haiku
            --mcp-config /tmp/mcp-config.json
          prompt: |
            # Notify PR Review

            A review was submitted on the PR. Add comment to Linear.

            ## Details
            - **Linear ID:** ${{ needs.extract.outputs.linear_id }}
            - **PR Number:** #${{ github.event.pull_request.number }}
            - **Reviewer:** ${{ github.event.review.user.login }}
            - **State:** ${{ github.event.review.state }}

            ## Instructions

            Add comment using `mcp__linear-server__create_comment`:

            ${{ github.event.review.state == 'approved' && 'Review approved - ready to merge' || '' }}
            ${{ github.event.review.state == 'changes_requested' && 'Changes requested - needs revision' || '' }}
            ${{ github.event.review.state == 'commented' && 'Review comment added' || '' }}

            Format:
            ```
            ${{ env.SYNC_MARKER }} PR Review: ${{ github.event.review.state }}

            Reviewer: @${{ github.event.review.user.login }}
            [View review](${{ github.event.review.html_url }})
            ```
