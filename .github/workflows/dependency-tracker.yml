name: Dependency Tracker

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (show what would be updated)'
        required: false
        default: 'false'
      notify_blocked:
        description: 'Notify about blocked issues'
        required: false
        default: 'true'

env:
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

jobs:
  track-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-mcp-

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Track Dependencies
        id: track
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model haiku
            --mcp-config /tmp/mcp-config.json
            --allowedTools mcp__linear-server__list_issues,mcp__linear-server__get_issue,mcp__linear-server__create_comment,mcp__linear-server__update_issue
          prompt: |
            # Dependency Tracker

            Check for blocked issues that can be unblocked.

            ## Instructions

            1. **List Issues**: Use `mcp__linear-server__list_issues` to get:
               - All issues in "Todo" or "In Progress" state

            2. **Check Blockers**: For each issue with dependencies:
               - Get issue details with `mcp__linear-server__get_issue`
               - Check if `blockedBy` issues are in "Done" or "Cancelled" state

            3. **Auto-Unblock**: If ALL blockers are resolved:
               ${{ github.event.inputs.dry_run == 'true' && '- Log what would be updated (DRY RUN)' || '- Add comment to issue using `mcp__linear-server__create_comment`: "Blocker(s) resolved. This issue is now unblocked."' }}

            4. **Notify Blocked**: If issue is still blocked:
               ${{ github.event.inputs.notify_blocked == 'true' && '- List the blocking issues that are not yet resolved' || '- Skip notification' }}

            ## Output Format

            Report your findings:

            ```
            DEPENDENCY TRACKER REPORT
            =========================

            Unblocked Issues:
            - [SMNTX-XX] Title - blockers resolved: [SMNTX-YY, SMNTX-ZZ]

            Still Blocked:
            - [SMNTX-XX] Title - waiting on: [SMNTX-YY (In Progress)]

            No Dependencies:
            - XX issues have no blockers
            ```

            Dry Run Mode: ${{ github.event.inputs.dry_run || 'false' }}

      - name: Summary
        if: always()
        run: |
          echo "## Dependency Tracker Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
