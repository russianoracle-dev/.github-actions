name: "AI Pipeline"

# ═══════════════════════════════════════════════════════════════════════════
# UNIFIED AI PIPELINE - Single entry point for all AI-triggered workflows
# Replaces: claude.yml + release.yml
#
# Actions:
#   @claude review    → Code review
#   @claude implement → Implement issue/feature
#   @claude release   → Release to production
#   @claude <other>   → General response
# ═══════════════════════════════════════════════════════════════════════════

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [labeled]
  repository_dispatch:
    types:
      # Linear status changes (AI actions only)
      - linear-status-in-progress    # → implement
      - linear-status-released       # → release
      # NOTE: todo/approved/cancelled handled by linear-sync.yml ONLY
      # Linear comments with @claude
      - linear-comment-mention       # → respond
      - linear-comment-review        # → review

env:
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

# ═══════════════════════════════════════════════════════════════════════════
# CONCURRENCY: Per-task isolation with SERIALIZATION (no cancellation)
# - Each task (Linear ID / GitHub Issue) runs in its own concurrency group
# - Multiple DIFFERENT tasks CAN run in parallel
# - Multiple runs of SAME task are SERIALIZED (queue, don't cancel!)
#
# IMPORTANT: cancel-in-progress: false prevents race conditions where:
# - Linear webhook triggers "In Progress"
# - User comments "@claude implement"
# - Both arrive ~simultaneously → second run would kill first
# With false: second run WAITS for first to complete
# ═══════════════════════════════════════════════════════════════════════════
concurrency:
  # Extract Linear ID from different event types:
  # - repository_dispatch: github.event.client_payload.linear_id
  # - issue_comment: extracted from issue.title in router job
  # - issues: extracted from issue.title in router job
  # - pull_request: extracted from PR.title in router job
  #
  # Priority: Linear ID > GitHub Issue > PR > unique run ID
  # Using github.run_id ensures uniqueness when other values are empty
  group: task-${{ github.event.client_payload.linear_id || github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false  # QUEUE runs, don't cancel! Prevents self-cannibalization

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # ROUTER - Single entry point, filters bots, determines action
  # Implements IDEMPOTENCY: same action from different sources = single execution
  # ═══════════════════════════════════════════════════════════════════════════
  router:
    # Filter bots at JOB level - prevents runner allocation for bot comments
    if: >-
      github.event.sender.type != 'Bot' &&
      !contains(fromJSON('["claude", "linear", "github-actions", "dependabot", "renovate"]'), github.event.sender.login)
    runs-on: ubuntu-latest
    outputs:
      action: ${{ steps.decide.outputs.action }}
      role: ${{ steps.decide.outputs.role }}
      model: ${{ steps.decide.outputs.model }}
      should_run: ${{ steps.decide.outputs.should_run }}
      linear_id: ${{ steps.decide.outputs.linear_id }}
      issue_number: ${{ steps.decide.outputs.issue_number }}
      issue_title: ${{ steps.decide.outputs.issue_title }}
      issue_url: ${{ steps.decide.outputs.issue_url }}
      issue_body: ${{ steps.decide.outputs.issue_body }}
      idempotency_key: ${{ steps.decide.outputs.idempotency_key }}
      version: ${{ steps.version.outputs.version }}
      prev_version: ${{ steps.version.outputs.prev_version }}
    steps:
      - name: "🚦 Route request"
        id: route
        env:
          # Pass bodies via env to avoid bash escaping issues with special chars
          COMMENT_BODY: ${{ github.event.comment.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          # Linear webhook payload (repository_dispatch)
          CLIENT_PAYLOAD_TITLE: ${{ github.event.client_payload.title }}
          CLIENT_PAYLOAD_DESCRIPTION: ${{ github.event.client_payload.description }}
          CLIENT_PAYLOAD_LINEAR_ID: ${{ github.event.client_payload.linear_id }}
          CLIENT_PAYLOAD_CODE_MODEL: ${{ github.event.client_payload.model_config.code_model }}
        run: |
          ACTION="none"
          ROLE="responder"
          MODEL="sonnet"
          SHOULD_RUN="false"
          LINEAR_ID=""

          # Initialize relation variables (empty by default)
          BLOCKED_BY="[]"
          BLOCKS="[]"
          RELATED="[]"

          EVENT="${{ github.event_name }}"
          SENDER_TYPE="${{ github.event.sender.type }}"

          echo "Event: $EVENT"
          echo "Sender: ${{ github.event.sender.login }} (type: $SENDER_TYPE)"

          # ═══════════════════════════════════════════════════════════════
          # FILTER: Ignore all bot comments (prevents duplicate runs)
          # Check both sender.type AND known bot logins
          # ═══════════════════════════════════════════════════════════════
          SENDER_LOGIN="${{ github.event.sender.login }}"
          # Regex pattern stored in variable (must be unquoted in =~ comparison)
          KNOWN_BOTS_REGEX="^(claude|linear|github-actions|dependabot|renovate)(\[bot\])?$"

          if [[ "$SENDER_TYPE" == "Bot" ]] || [[ "$SENDER_LOGIN" =~ $KNOWN_BOTS_REGEX ]]; then
            echo "Ignoring bot comment from: $SENDER_LOGIN (type: $SENDER_TYPE)"
            echo "action=none" >> $GITHUB_OUTPUT
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # ═══════════════════════════════════════════════════════════════
          # ROUTE: Determine action based on event and content
          # ═══════════════════════════════════════════════════════════════

          # --- Issue/PR Comments ---
          if [[ "$EVENT" == "issue_comment" ]]; then
            COMMENT="$COMMENT_BODY"

            # Extract Linear ID from issue title (e.g., "[SMNTX-83]" or "(SMNTX-83)" or "SMNTX-83")
            if [[ -z "$LINEAR_ID" ]]; then
              LINEAR_ID=$(echo "$ISSUE_TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
            fi

            if echo "$COMMENT" | grep -qiE "@claude +release"; then
              ACTION="release"
              SHOULD_RUN="true"
            elif echo "$COMMENT" | grep -qiE "@claude +review"; then
              ACTION="review"
              ROLE="responder"
              MODEL="haiku"  # glm-4.5-air for fast reviews (2-3x faster)
              SHOULD_RUN="true"
            elif echo "$COMMENT" | grep -qiE "@claude +implement"; then
              ACTION="implement"
              ROLE="implementer"
              SHOULD_RUN="true"
            elif echo "$COMMENT" | grep -qiE "@claude"; then
              ACTION="respond"
              ROLE="responder"
              MODEL="haiku"  # glm-4.5-air for quick responses (2-3x faster)
              SHOULD_RUN="true"
            fi
          fi

          # --- PR Review Comments ---
          if [[ "$EVENT" == "pull_request_review_comment" ]]; then
            COMMENT="$COMMENT_BODY"
            if echo "$COMMENT" | grep -qiE "@claude"; then
              ACTION="respond"
              ROLE="responder"
              SHOULD_RUN="true"
            fi
          fi

          # --- PR Reviews ---
          if [[ "$EVENT" == "pull_request_review" ]]; then
            BODY="$REVIEW_BODY"
            if echo "$BODY" | grep -qiE "@claude"; then
              ACTION="respond"
              ROLE="responder"
              SHOULD_RUN="true"
            fi
          fi

          # --- New Issues with @claude ---
          if [[ "$EVENT" == "issues" && "${{ github.event.action }}" == "opened" ]]; then
            BODY="$ISSUE_BODY"
            TITLE="${{ github.event.issue.title }}"
            if echo "$BODY $TITLE" | grep -qiE "@claude"; then
              ACTION="respond"
              ROLE="responder"
              SHOULD_RUN="true"
            fi
          fi

          # --- Issue labeled 'claude-implement' ---
          if [[ "$EVENT" == "issues" && "${{ github.event.action }}" == "labeled" ]]; then
            if [[ "${{ github.event.label.name }}" == "claude-implement" ]]; then
              ACTION="implement"
              SHOULD_RUN="true"

              # Detect role from labels (optimized model selection)
              LABELS='${{ join(github.event.issue.labels.*.name, ',') }}'
              if echo "$LABELS" | grep -qiE "research|explore|investigation"; then
                ROLE="architect"
                MODEL="opus"  # glm-4.7 for complex research
              elif echo "$LABELS" | grep -qiE "architecture|arch"; then
                ROLE="architect"
                MODEL="sonnet"  # glm-4.7 for architecture
              elif echo "$LABELS" | grep -qiE "bug|fix|hotfix"; then
                ROLE="debugger"
                MODEL="haiku"  # glm-4.5-air for fast bug fixes (2-3x faster)
              elif echo "$LABELS" | grep -qiE "feature|enhancement"; then
                ROLE="implementer"
                MODEL="haiku"  # glm-4.5-air for simple features (2-3x faster)
              elif echo "$LABELS" | grep -qiE "refactor|cleanup|docs"; then
                ROLE="implementer"
                MODEL="haiku"  # glm-4.5-air for simple refactoring
              else
                ROLE="implementer"
                MODEL="sonnet"  # glm-4.7 for complex tasks
              fi
            fi
          fi

          # --- Issue assigned to Claude ---
          if [[ "$EVENT" == "issues" && "${{ github.event.action }}" == "assigned" ]]; then
            ASSIGNEE="${{ github.event.assignee.login }}"
            if [[ "$ASSIGNEE" == "app/claude-code" || "$ASSIGNEE" == "claude" ]]; then
              ACTION="implement"
              ROLE="implementer"
              SHOULD_RUN="true"
            fi
          fi

          # --- PR labeled 'release' ---
          if [[ "$EVENT" == "pull_request" && "${{ github.event.action }}" == "labeled" ]]; then
            if [[ "${{ github.event.label.name }}" == "release" ]]; then
              ACTION="release"
              SHOULD_RUN="true"
            fi
          fi

          # --- Linear webhooks (status, assign, comments) ---
          if [[ "$EVENT" == "repository_dispatch" ]]; then
            DISPATCH_ACTION="${{ github.event.action }}"
            # Use env vars to avoid shell escaping issues with special chars in payload
            LINEAR_ID="$CLIENT_PAYLOAD_LINEAR_ID"

            # Extract Linear issue context from webhook payload (via env vars)
            ISSUE_TITLE="$CLIENT_PAYLOAD_TITLE"
            ISSUE_BODY="$CLIENT_PAYLOAD_DESCRIPTION"

            echo "Linear dispatch: $DISPATCH_ACTION for $LINEAR_ID"
            echo "  Title: $ISSUE_TITLE"
            echo "  Description length: ${#ISSUE_BODY}"

            case "$DISPATCH_ACTION" in
              "linear-status-in-progress")
                ACTION="implement"
                ROLE="implementer"
                SHOULD_RUN="true"
                # Use model config from Linear labels if provided
                if [ -n "$CLIENT_PAYLOAD_CODE_MODEL" ]; then
                  MODEL="$CLIENT_PAYLOAD_CODE_MODEL"
                fi
                ;;
              "linear-status-released")
                ACTION="release"
                SHOULD_RUN="true"
                ;;
              "linear-comment-mention")
                ACTION="respond"
                ROLE="responder"
                SHOULD_RUN="true"
                ;;
              "linear-comment-review")
                ACTION="review"
                ROLE="responder"
                SHOULD_RUN="true"
                ;;
              *)
                # Unknown event type - ignore
                ACTION="none"
                SHOULD_RUN="false"
                ;;
            esac
          fi

          # Extract issue number for idempotency
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER="${{ github.event.pull_request.number }}"
          fi

          # Create idempotency key: linear_id or issue number
          if [ -n "$LINEAR_ID" ]; then
            IDEMPOTENCY_KEY="$LINEAR_ID"
          elif [ -n "$ISSUE_NUMBER" ]; then
            IDEMPOTENCY_KEY="issue-$ISSUE_NUMBER"
          else
            IDEMPOTENCY_KEY="run-${{ github.run_id }}"
          fi

          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "role=$ROLE" >> $GITHUB_OUTPUT
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "linear_id=$LINEAR_ID" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT

          # Set issue_url based on event type
          if [[ "$EVENT" == "repository_dispatch" && -n "$LINEAR_ID" ]]; then
            # For Linear events, construct Linear issue URL
            ISSUE_URL="https://linear.app/russianoracle/issue/$LINEAR_ID"
          else
            # For GitHub events, use GitHub issue URL
            ISSUE_URL="${{ github.event.issue.html_url }}"
          fi
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          echo "idempotency_key=$IDEMPOTENCY_KEY" >> $GITHUB_OUTPUT

          # Pass issue body as multiline output (HEREDOC format)
          {
            echo "issue_body<<EOF"
            echo "$ISSUE_BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Relations/dependencies are optional - skip output to avoid quote issues
          # They can be added back later if needed in prompt

          echo "📋 Decision: action=$ACTION, role=$ROLE, key=$IDEMPOTENCY_KEY, linear=$LINEAR_ID"

      # ═══════════════════════════════════════════════════════════════════
      # IDEMPOTENCY CHECK - Skip if already being processed
      # Prevents duplicate work when same action arrives from:
      #   - @claude implement comment
      #   - Linear "In Progress" webhook
      #   - Issue assigned to Claude
      #
      # NOTE: This router job uses gh CLI for QUICK bash checks.
      #       Claude jobs will use GitHub MCP for actual operations.
      # ═══════════════════════════════════════════════════════════════════
      - name: Checkout (for idempotency check)
        if: steps.route.outputs.action == 'implement' && steps.route.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🔒 Check idempotency (implement actions)"
        if: steps.route.outputs.action == 'implement' && steps.route.outputs.should_run == 'true'
        id: idempotency
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IDEM_KEY="${{ steps.route.outputs.idempotency_key }}"
          LINEAR_ID="${{ steps.route.outputs.linear_id }}"
          ISSUE_NUM="${{ steps.route.outputs.issue_number }}"

          echo "🔍 Checking idempotency for: $IDEM_KEY"
          echo "   Linear ID: $LINEAR_ID, Issue: $ISSUE_NUM"

          # ═══════════════════════════════════════════════════════════════
          # Cross-platform check: Linear ID and GitHub Issue may be linked
          # RUS-45 (Linear) ↔ #123 (GitHub) = SAME task
          # ═══════════════════════════════════════════════════════════════

          # Get all open PRs once
          ALL_PRS=$(gh pr list --repo ${{ github.repository }} --state open --json number,title,body)

          # Check 1: PR with Linear ID in title [RUS-45] or (RUS-45)
          EXISTING_PR=""
          if [ -n "$LINEAR_ID" ]; then
            # Try square brackets first [SMNTX-93]
            EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.title | test(\"\\\\[$LINEAR_ID\\\\]\"; \"i\")) | .number" | head -1)

            # If not found, try round brackets (SMNTX-93)
            if [ -z "$EXISTING_PR" ]; then
              EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.title | test(\"\\\\($LINEAR_ID\\\\)\"; \"i\")) | .number" | head -1)
            fi

            # If still not found, try plain string SMNTX-93
            if [ -z "$EXISTING_PR" ]; then
              EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.title | test(\"$LINEAR_ID\"; \"i\")) | .number" | head -1)
            fi

            echo "   Check [LINEAR_ID] in title: ${EXISTING_PR:-none}"
          fi

          # Check 2: PR with issue reference #123
          if [ -z "$EXISTING_PR" ] && [ -n "$ISSUE_NUM" ]; then
            EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.title | test(\"#$ISSUE_NUM\"; \"i\")) | .number" | head -1)
            echo "   Check #issue in title: ${EXISTING_PR:-none}"
          fi

          # Check 3: PR body mentions Linear ID (cross-link)
          if [ -z "$EXISTING_PR" ] && [ -n "$LINEAR_ID" ]; then
            EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.body | test(\"$LINEAR_ID\"; \"i\")) | .number" | head -1)
            echo "   Check LINEAR_ID in body: ${EXISTING_PR:-none}"
          fi

          # Check 4: PR body mentions issue (closes #123)
          if [ -z "$EXISTING_PR" ] && [ -n "$ISSUE_NUM" ]; then
            EXISTING_PR=$(echo "$ALL_PRS" | jq -r ".[] | select(.body | test(\"(closes|fixes|resolves).*#$ISSUE_NUM\"; \"i\")) | .number" | head -1)
            echo "   Check closes #issue in body: ${EXISTING_PR:-none}"
          fi

          if [ -n "$EXISTING_PR" ]; then
            echo "⚠️ PR #$EXISTING_PR already exists for $IDEM_KEY - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=PR #$EXISTING_PR exists" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check 2: Is there a branch already created?
          BRANCH_PATTERN=""
          if [ -n "$LINEAR_ID" ]; then
            BRANCH_PATTERN=$(echo "$LINEAR_ID" | tr '[:upper:]' '[:lower:]')
          fi
          if [ -n "$BRANCH_PATTERN" ]; then
            EXISTING_BRANCH=$(git ls-remote --heads origin "*$BRANCH_PATTERN*" 2>/dev/null | head -1)
            if [ -n "$EXISTING_BRANCH" ]; then
              echo "⚠️ Branch for $IDEM_KEY already exists - skipping"
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "reason=Branch exists" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Check 3: Is there another workflow run in progress for same Linear ID?
          # This prevents concurrent execution of same task
          if [ -n "$LINEAR_ID" ]; then
            # Get current run ID
            CURRENT_RUN_ID="${{ github.run_id }}"

            # Get all in-progress runs for this workflow
            RUNNING_RUNS=$(gh run list --repo ${{ github.repository }} --workflow="unified-ai-pipeline.yml" \
              --status=in_progress --json databaseId,headBranch --jq '.[]')

            # Check if any other run is for the same Linear ID (by checking commit messages or branch names)
            while IFS= read -r run_info; do
              RUN_ID=$(echo "$run_info" | jq -r '.databaseId')
              BRANCH=$(echo "$run_info" | jq -r '.headBranch')

              # Skip current run
              if [ "$RUN_ID" = "$CURRENT_RUN_ID" ]; then
                continue
              fi

              # Check if this run is for the same Linear ID
              # For now, allow multiple concurrent runs (they'll be handled by PR/branch checks above)
              # But log for monitoring
            done <<< "$RUNNING_RUNS"
          fi

          echo "✅ No duplicate found, proceeding"
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: "📊 Final decision"
        id: decide
        env:
          # Pass issue body via env var to handle special chars
          ROUTE_ISSUE_BODY: ${{ steps.route.outputs.issue_body }}
        run: |
          ACTION="${{ steps.route.outputs.action }}"
          SHOULD_RUN="${{ steps.route.outputs.should_run }}"
          SKIP="${{ steps.idempotency.outputs.skip }}"

          # If idempotency check says skip, override should_run
          if [ "$SKIP" == "true" ]; then
            echo "🚫 Skipping due to idempotency: ${{ steps.idempotency.outputs.reason }}"
            SHOULD_RUN="false"
          fi

          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "role=${{ steps.route.outputs.role }}" >> $GITHUB_OUTPUT
          echo "model=${{ steps.route.outputs.model }}" >> $GITHUB_OUTPUT
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "linear_id=${{ steps.route.outputs.linear_id }}" >> $GITHUB_OUTPUT
          echo "issue_number=${{ steps.route.outputs.issue_number }}" >> $GITHUB_OUTPUT
          echo "issue_title=${{ steps.route.outputs.issue_title }}" >> $GITHUB_OUTPUT
          echo "issue_url=${{ steps.route.outputs.issue_url }}" >> $GITHUB_OUTPUT
          echo "idempotency_key=${{ steps.route.outputs.idempotency_key }}" >> $GITHUB_OUTPUT

          # Pass through issue body (multiline via env var)
          {
            echo "issue_body<<EOF"
            echo "$ROUTE_ISSUE_BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "📋 Final: action=$ACTION, should_run=$SHOULD_RUN"

      - name: "💬 Notify skipped (idempotency)"
        if: steps.idempotency.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ steps.route.outputs.issue_number }}"
          REASON="${{ steps.idempotency.outputs.reason }}"

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" --repo ${{ github.repository }} \
              --body "ℹ️ **Skipped duplicate action**

          This task is already being processed: $REASON

          No additional work needed." || true
          fi

      - name: Checkout (for versioning)
        if: steps.route.outputs.action == 'release'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        if: steps.route.outputs.action == 'release'
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          LATEST_VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "prev_version=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "📦 Version: $LATEST_TAG → $NEW_VERSION"

  # ═══════════════════════════════════════════════════════════════════════════
  # CLAUDE RESPOND - Quick responses to @claude mentions
  # ═══════════════════════════════════════════════════════════════════════════
  claude-respond:
    needs: router
    if: needs.router.outputs.should_run == 'true' && (needs.router.outputs.action == 'respond' || needs.router.outputs.action == 'review')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache NPX packages (speeds up MCP server startup 3-5x)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-mcp-
            ${{ runner.os }}-npx-

      - name: Load system prompts
        run: |
          BASE=$(cat .github/system-prompts/_base.md)
          ROLE=$(cat .github/system-prompts/responder.md)

          # Load GitHub MCP usage guide
          GITHUB_MCP_GUIDE=""
          if [ -f ".github/system-prompts/github-mcp-usage.md" ]; then
            GITHUB_MCP_GUIDE=$(cat .github/system-prompts/github-mcp-usage.md)
          fi

          echo "${BASE}

          ---

          ${ROLE}

          ---

          ${GITHUB_MCP_GUIDE}" > /tmp/system-prompt.txt

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Substitute all environment variables in MCP config
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" | \
            sed "s/\${GITHUB_TOKEN}/$GITHUB_TOKEN/g" \
            > /tmp/mcp-config.json

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: .github/claude-settings.json
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --append-system-prompt /tmp/system-prompt.txt
          additional_permissions: |
            actions: read
          show_full_output: true

  # ═══════════════════════════════════════════════════════════════════════════
  # CLAUDE IMPLEMENT - Auto-implement issues
  # ═══════════════════════════════════════════════════════════════════════════
  claude-implement:
    needs: router
    if: needs.router.outputs.should_run == 'true' && needs.router.outputs.action == 'implement'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Cache NPX packages (speeds up MCP server startup 3-5x)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-mcp-
            ${{ runner.os }}-npx-

      - name: 📢 Notify start (GitHub + Linear)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          LINEAR_ID="${{ needs.router.outputs.linear_id }}"
          ISSUE_NUM="${{ needs.router.outputs.issue_number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ROLE="${{ needs.router.outputs.role }}"
          MODEL="${{ needs.router.outputs.model }}"

          # NOTE: GitHub comment removed - track_progress: true creates tracking comment automatically

          # Update Linear status
          if [ -n "$LINEAR_ID" ]; then
            ISSUE_DATA=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"$LINEAR_ID\\\") { id } }\"}")

            ISSUE_ID=$(echo "$ISSUE_DATA" | jq -r '.data.issue.id // empty')

            if [ -n "$ISSUE_ID" ]; then
              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"🚀 **GitHub Actions started**\\n\\n- Role: \`$ROLE\`\\n- Model: \`$MODEL\`\\n- [View job]($RUN_URL)\\\" }) { success } }\"}"
            fi
          fi

      - name: Load system prompts
        run: |
          ROLE="${{ needs.router.outputs.role }}"
          BASE=$(cat .github/system-prompts/_base.md)
          ROLE_PROMPT=$(cat .github/system-prompts/${ROLE}.md)

          # Load Linear integration guidelines if available
          LINEAR_GUIDE=""
          if [ -f ".github/system-prompts/linear-integration.md" ]; then
            LINEAR_GUIDE=$(cat .github/system-prompts/linear-integration.md)
          fi

          # Load GitHub MCP usage guide
          GITHUB_MCP_GUIDE=""
          if [ -f ".github/system-prompts/github-mcp-usage.md" ]; then
            GITHUB_MCP_GUIDE=$(cat .github/system-prompts/github-mcp-usage.md)
          fi

          cat > /tmp/system-prompt.txt << SYSPROMPT_EOF
          ${BASE}

          ---

          ${ROLE_PROMPT}

          ---

          ${LINEAR_GUIDE}

          ---

          ${GITHUB_MCP_GUIDE}
          SYSPROMPT_EOF

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Substitute all environment variables in MCP config
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" | \
            sed "s/\${GITHUB_TOKEN}/$GITHUB_TOKEN/g" \
            > /tmp/mcp-config.json

      - name: 📝 Create progress instructions
        run: |
          cat > /tmp/progress-instructions.txt << 'PROGRESS_EOF'
          ## 📊 PROGRESS REPORTING (ОБЯЗАТЕЛЬНО)

          Регулярно обновляй tracking comment используя MCP tool `mcp__github_comment__update_claude_comment`.

          ### Формат:

          ## Implementation Progress

          ### 📋 Understanding
          [Как понял задачу, 2-3 предложения]

          ### ✅ TODO
          - [x] Завершённые шаги
          - [ ] Текущий шаг ← 👈 сейчас
          - [ ] Следующие шаги

          ### ⚠️ Problems
          [Найденные проблемы или "Нет проблем"]

          ### 💡 Conclusions
          [Промежуточные выводы]

          ### 🔜 Next Steps
          [Что планируется дальше]

          ---
          ⏱️ Updated: [время]

          ### Когда обновлять:
          1. После понимания задачи
          2. После каждого TODO
          3. При проблеме
          4. В конце
          PROGRESS_EOF

          # Добавить метаданные
          cat >> /tmp/progress-instructions.txt << METADATA_EOF

          ---
          ## Метаданные
          - **Role**: ${{ needs.router.outputs.role }}
          - **Model**: ${{ needs.router.outputs.model }}
          - **Linear**: ${{ needs.router.outputs.linear_id }}
          - **Issue**: #${{ needs.router.outputs.issue_number }}
          - **Job**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          METADATA_EOF

      - name: Configure git credentials for push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git credentials BEFORE Claude Code action
          # This ensures git push uses GITHUB_TOKEN for authentication
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials
          echo "✅ Git credentials configured for push"

      - name: Implement
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: .github/claude-settings.json
          track_progress: false  # Disabled: not supported for repository_dispatch events
          # Branch settings - NEVER push to main!
          branch_prefix: "feature/"
          base_branch: "main"
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --model ${{ needs.router.outputs.model }}
            --append-system-prompt /tmp/system-prompt.txt
            --append-system-prompt /tmp/progress-instructions.txt
          additional_permissions: |
            actions: read
          show_full_output: true
          prompt: |
            # Implementation Task

            You have been assigned to implement this GitHub issue.

            ## Task Details

            **Issue:** ${{ needs.router.outputs.issue_url }}
            **Title:** ${{ needs.router.outputs.issue_title }}
            **Linear ID:** ${{ needs.router.outputs.linear_id }}

            ### Description

            ${{ needs.router.outputs.issue_body }}

            ### Dependencies

            Check the GitHub issue page for blocking/related tasks.
            See issue body for complete task relationships and dependencies.

            ---

            ## CRITICAL: Branch Policy
            **NEVER commit directly to main!** Always create a feature branch first.

            **Branch naming:** `feature/<linear-id>-short-description`
            **Commit format:** `<type>: <description> [LINEAR-ID]`
            **PR title format:** `<type>: <description> [LINEAR-ID]`

            ## Context
            - **Role**: ${{ needs.router.outputs.role }}
            - **Model**: ${{ needs.router.outputs.model }}
            - **Issue #**: ${{ needs.router.outputs.issue_number }}

            ## Instructions
            1. Analyze the task description above (NO need to call `gh issue view`)
            2. Create a feature branch following naming convention
            3. Implement following your role guidelines
            4. Run tests: `pytest -v` (all must pass)
            5. Commit with conventional format including Linear ID in square brackets
            6. Create Pull Request with proper title format

            Begin implementation now.

      - name: ✅ Verify branch was created and pushed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Verifying implementation results..."

          # Configure git credentials for push
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials

          # Get current branch name (should be feature/*)
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "📍 Current branch: $CURRENT_BRANCH"

          # Check if we're on a feature branch
          if [[ ! "$CURRENT_BRANCH" =~ ^feature/ ]]; then
            echo "❌ ERROR: Not on a feature branch! Current: $CURRENT_BRANCH"
            echo "Claude should have created a feature branch but didn't."
            exit 1
          fi

          # Check if branch exists on remote
          if ! git ls-remote --heads origin "$CURRENT_BRANCH" | grep -q "$CURRENT_BRANCH"; then
            echo "❌ ERROR: Branch '$CURRENT_BRANCH' was NOT pushed to remote!"
            echo "Claude made changes locally but failed to push to GitHub."
            echo ""
            echo "This means:"
            echo "  - Changes are committed locally"
            echo "  - But branch doesn't exist on GitHub"
            echo "  - No PR can be created"
            echo ""
            echo "Possible causes:"
            echo "  - Git push failed (auth/permissions)"
            echo "  - Network error during push"
            echo "  - Claude skipped git push step"
            exit 1
          fi

          echo "✅ Branch '$CURRENT_BRANCH' exists on remote"

          # Check if there are actual changes compared to main
          git fetch origin main
          COMMIT_COUNT=$(git rev-list --count origin/main..origin/$CURRENT_BRANCH)
          echo "📊 Commits on top of main: $COMMIT_COUNT"

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No commits found on branch!"
            echo "Branch exists but has no changes compared to main."
            exit 1
          fi

          echo "✅ Branch has $COMMIT_COUNT commit(s)"

      - name: 🧪 Run tests (verify implementation)
        if: success() || failure()
        run: |
          echo "🧪 Running tests to verify implementation..."

          # Install dependencies
          pip install -e ".[dev]" > /dev/null 2>&1

          # Run tests and capture exit code
          if pytest tests/unit -v --tb=short; then
            echo "✅ All tests passed!"
          else
            TEST_EXIT_CODE=$?
            echo "❌ TESTS FAILED!"
            echo "Exit code: $TEST_EXIT_CODE"
            echo ""
            echo "Claude committed code that breaks tests."
            echo "This violates the requirement: 'pytest -v (all must pass)'"
            exit 1
          fi

      - name: 📢 Notify completion (Linear)
        if: always()
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          LINEAR_ID="${{ needs.router.outputs.linear_id }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          STATUS="${{ job.status }}"

          if [ -n "$LINEAR_ID" ]; then
            ISSUE_DATA=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issue(id: \\\"$LINEAR_ID\\\") { id } }\"}")

            ISSUE_ID=$(echo "$ISSUE_DATA" | jq -r '.data.issue.id // empty')

            if [ -n "$ISSUE_ID" ]; then
              if [ "$STATUS" == "success" ]; then
                EMOJI="✅"
                MSG="Implementation completed successfully"
              else
                EMOJI="❌"
                MSG="Implementation failed"
              fi

              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { commentCreate(input: { issueId: \\\"$ISSUE_ID\\\", body: \\\"$EMOJI **$MSG**\\n\\n[View job]($RUN_URL)\\\" }) { success } }\"}"
            fi
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # RELEASE PIPELINE - Test → Build → Deploy
  # ═══════════════════════════════════════════════════════════════════════════
  release-test:
    needs: router
    if: needs.router.outputs.should_run == 'true' && needs.router.outputs.action == 'release'
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333  # HTTP REST API
          - 6334:6334  # gRPC API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:6333/readyz > /dev/null 2>&1; then
              echo "✅ Qdrant is ready"
              exit 0
            fi
            echo "Attempt $i/30: Qdrant not ready yet..."
            sleep 2
          done
          echo "❌ Qdrant failed to start"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          QDRANT_URL: http://localhost:6333
          QDRANT_PREFER_GRPC: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_PROXY_ENDPOINT: ${{ secrets.GEMINI_PROXY_ENDPOINT }}
        run: pytest tests/unit -v --tb=short

      - name: Verify MCP server
        run: |
          timeout 30 python -c "
          import asyncio
          from mcp import ClientSession, StdioServerParameters
          from mcp.client.stdio import stdio_client

          async def test():
              params = StdioServerParameters(command='python', args=['-m', 'src.main'])
              async with stdio_client(params) as (read, write):
                  async with ClientSession(read, write) as session:
                      await session.initialize()
                      tools = await session.list_tools()
                      print(f'✅ MCP: {len(tools.tools)} tools')
                      assert len(tools.tools) > 0

          asyncio.run(test())
          " || echo "⚠️ MCP test skipped"

  release-build:
    needs: [router, release-test]
    if: needs.router.outputs.should_run == 'true' && needs.router.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create clean release
        run: |
          mkdir -p release_build
          rsync -av --progress . release_build/ \
            --exclude='.git' --exclude='release_build'

      - name: Remove dev files
        working-directory: release_build
        run: |
          # Secrets
          rm -f .env .env.* *.pem *.key
          rm -rf secrets/ .secrets/

          # CI internals
          rm -f scripts/linear-webhook-*.js
          rm -rf .github/ISSUE_TEMPLATE/

          # Dev artifacts
          rm -rf .claude/ .cursor/ .idea/ .vscode/
          rm -rf __pycache__/ .pytest_cache/ .mypy_cache/
          rm -rf tests/ *.egg-info/ dist/ build/

          find . -name "*.pyc" -delete
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

      - name: Remove AI mentions
        working-directory: release_build
        run: |
          find . -type f \( -name "*.py" -o -name "*.md" -o -name "*.yml" \) | while read file; do
            sed -i 's/[Cc]laude//gi; s/[Aa]nthropic//gi; s/Co-Authored-By:.*//gi' "$file" 2>/dev/null || true
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.router.outputs.version }}
          path: release_build/
          retention-days: 3

  release-deploy:
    needs: [router, release-build]
    if: needs.router.outputs.should_run == 'true' && needs.router.outputs.action == 'release'
    runs-on: ubuntu-latest
    env:
      PROD_REPO: ${{ secrets.PROD_REPO_URL }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.router.outputs.version }}
          path: release_build/

      - name: Configure git
        run: |
          git config --global user.name "Release Bot"
          git config --global user.email "release@mcp-semantix-rag.dev"

      - name: Setup SSH
        env:
          PROD_DEPLOY_KEY: ${{ secrets.PROD_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PROD_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Push to production
        working-directory: release_build
        env:
          VERSION: ${{ needs.router.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$PROD_REPO" ]; then
            echo "❌ PROD_REPO_URL not configured"
            exit 1
          fi

          # Configure git credentials
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials

          git init
          git branch -M main
          git add -A
          git commit -m "Release $VERSION"
          git tag "$VERSION"
          git remote add prod "$PROD_REPO"
          git push prod main --force
          git push prod "$VERSION"

          echo "✅ Released $VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.router.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --repo ${{ github.repository }} \
            --title "Release $VERSION" \
            --notes "Release $VERSION to production"

  release-notify:
    needs: [router, release-deploy]
    if: always() && needs.router.outputs.action == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Post status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.router.outputs.version }}
        run: |
          if [ "${{ needs.release-deploy.result }}" == "success" ]; then
            STATUS="✅ Released $VERSION"
          else
            STATUS="❌ Release failed"
          fi

          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "## 🚀 Release Status

          $STATUS

          **Install:** \`uvx mcp-semantix-rag\`"
          fi
