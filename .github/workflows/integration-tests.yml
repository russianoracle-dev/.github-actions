name: Integration Tests

# ═══════════════════════════════════════════════════════════════════
# ON-DEMAND ONLY - Heavy workflow with Qdrant service
# Trigger: label 'run-integration-tests' or manual dispatch
# ═══════════════════════════════════════════════════════════════════
on:
  pull_request:
    types: [labeled]
  workflow_dispatch:  # Manual trigger

jobs:
  integration:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.label.name == 'run-integration-tests')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333  # HTTP REST API
          - 6334:6334  # gRPC API

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Qdrant
        run: |
          echo "Waiting for Qdrant to be ready..."
          for i in {1..30}; do
            if curl -sf http://localhost:6333/readyz > /dev/null 2>&1; then
              echo "✅ Qdrant is ready"
              exit 0
            fi
            echo "Attempt $i/30: Qdrant not ready yet..."
            sleep 2
          done
          echo "❌ Qdrant failed to start"
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests (without API keys)
        env:
          QDRANT_URL: http://localhost:6333
        run: |
          # Run tests that don't require API keys
          pytest tests/integration/ -v -m integration -k "not glm and not gemini" || true

      - name: Run GLM integration tests (with API key)
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          QDRANT_URL: http://localhost:6333
        run: |
          if [ -n "$ZAI_API_KEY" ]; then
            pytest tests/integration/test_full_workflow_glm.py -v -m integration
          else
            echo "⚠️ Skipping GLM tests: ZAI_API_KEY not configured"
          fi

      - name: Run Gemini integration tests (with API key)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QDRANT_URL: http://localhost:6333
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            pytest tests/integration/ -v -m integration -k "gemini"
          else
            echo "⚠️ Skipping Gemini tests: GEMINI_API_KEY not configured"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            .coverage
            htmlcov/
          retention-days: 3
