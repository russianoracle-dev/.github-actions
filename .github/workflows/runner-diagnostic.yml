name: Runner Diagnostic

on: workflow_dispatch

jobs:
  diagnostic:
    runs-on: self-hosted
    steps:
      - name: Environment info
        run: |
          echo "=== OS ===" && uname -a
          echo "=== Python ===" && python3 --version 2>/dev/null || echo "not found"
          echo "=== Pip ===" && pip3 --version 2>/dev/null || echo "not found"
          echo "=== Node ===" && node --version 2>/dev/null || echo "not found"
          echo "=== Docker ===" && docker --version 2>/dev/null || echo "not found"
          echo "=== actionlint ===" && actionlint --version 2>/dev/null || echo "not found"
          echo "=== yamllint ===" && yamllint --version 2>/dev/null || echo "not found"
          echo "=== check-jsonschema ===" && check-jsonschema --version 2>/dev/null || echo "not found"
          echo "=== PATH ===" && echo $PATH
          echo "=== Installed packages ===" && pip3 list 2>/dev/null | head -30
