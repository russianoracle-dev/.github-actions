name: Auto Release Notes

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3)'
        required: true
      prev_version:
        description: 'Previous version tag (optional)'
        required: false

env:
  ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}

jobs:
  generate-notes:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    outputs:
      release_notes: ${{ steps.generate.outputs.notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for commit analysis

      - name: Determine versions
        id: versions
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          if [ -n "${{ github.event.inputs.prev_version }}" ]; then
            PREV_VERSION="${{ github.event.inputs.prev_version }}"
          else
            # Get previous tag
            PREV_VERSION=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Previous: $PREV_VERSION"

      - name: Extract Linear IDs from commits
        id: extract
        run: |
          VERSION="${{ steps.versions.outputs.version }}"
          PREV_VERSION="${{ steps.versions.outputs.prev_version }}"

          if [ -n "$PREV_VERSION" ]; then
            COMMITS=$(git log "$PREV_VERSION".."$VERSION" --pretty=format:"%s" 2>/dev/null || git log --oneline -20)
          else
            COMMITS=$(git log --oneline -20)
          fi

          # Extract Linear IDs (SMNTX-XX, RUS-XX, etc.)
          LINEAR_IDS=$(echo "$COMMITS" | grep -oE '\[?[A-Z]+-[0-9]+\]?' | tr -d '[]' | sort -u | tr '\n' ',' | sed 's/,$//')

          echo "linear_ids=$LINEAR_IDS" >> $GITHUB_OUTPUT
          echo "Found Linear IDs: $LINEAR_IDS"

          # Save commits for context
          echo "$COMMITS" > /tmp/commits.txt

      - name: Cache NPX packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npx-mcp-${{ hashFiles('.github/mcp-servers.json') }}
          restore-keys: |
            ${{ runner.os }}-npx-mcp-

      - name: Create MCP config
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          cat .github/mcp-servers.json | \
            sed "s/\${LINEAR_API_KEY}/$LINEAR_API_KEY/g" | \
            sed "s/\${ANTHROPIC_API_KEY}/${{ secrets.ANTHROPIC_API_KEY }}/g" \
            > /tmp/mcp-config.json

      - name: Generate Release Notes
        id: generate
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --model sonnet
            --allowedTools mcp__linear-server__get_issue,mcp__linear-server__list_issues,mcp__web-reader__webReader,mcp__zread__get_repo_structure
          prompt: |
            # Generate Release Notes

            Create release notes for version **${{ steps.versions.outputs.version }}**.

            ## Commits in this release

            ```
            $(cat /tmp/commits.txt)
            ```

            ## Linear Issues

            For each of these Linear IDs, use `mcp__linear-server__get_issue` to get details:
            ${{ steps.extract.outputs.linear_ids }}

            ## Instructions

            1. Fetch details for each Linear issue using MCP tools
            2. Group changes by category:
               - Features (new functionality)
               - Bug Fixes
               - Improvements
               - Breaking Changes (if any)
            3. Write concise, user-friendly descriptions
            4. Include Linear issue links

            ## Output Format

            Generate markdown release notes:

            ```markdown
            ## What's New

            ### Features
            - Feature description ([SMNTX-XX](link))

            ### Bug Fixes
            - Fix description ([SMNTX-XX](link))

            ### Improvements
            - Improvement description

            ## Contributors
            - List contributors from commits

            ## Full Changelog
            Previous: ${{ steps.versions.outputs.prev_version }}
            Current: ${{ steps.versions.outputs.version }}
            ```

            Output the release notes markdown only.

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.versions.outputs.version }}
        run: |
          # Check if release already exists
          if gh release view "$VERSION" --repo ${{ github.repository }} &>/dev/null; then
            echo "Release $VERSION already exists, updating..."
            gh release edit "$VERSION" \
              --repo ${{ github.repository }} \
              --notes-file /dev/stdin <<< "${{ steps.generate.outputs.notes || 'Release $VERSION' }}"
          else
            echo "Creating new release $VERSION..."
            gh release create "$VERSION" \
              --repo ${{ github.repository }} \
              --title "Release $VERSION" \
              --notes "${{ steps.generate.outputs.notes || 'Release $VERSION' }}" \
              --generate-notes
          fi

      - name: Create Linear Document (optional)
        if: steps.extract.outputs.linear_ids != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --mcp-config /tmp/mcp-config.json
            --model haiku
            --allowedTools mcp__linear-server__create_document,mcp__linear-server__get_issue
          prompt: |
            Create a release document in Linear using `mcp__linear-server__create_document`.

            Title: "Release ${{ steps.versions.outputs.version }}"
            Content: Release notes for version ${{ steps.versions.outputs.version }}

            Include:
            - Link to GitHub release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.versions.outputs.version }}
            - Summary of changes
            - Related issues: ${{ steps.extract.outputs.linear_ids }}
