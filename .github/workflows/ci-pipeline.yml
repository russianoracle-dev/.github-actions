name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # ========================================
  # Job 1: Lint & Code Quality
  # ========================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install npm dependencies
        working-directory: ./npm-package
        run: npm install

      # Python linting
      - name: Run Ruff linter
        run: |
          ruff check src/ semantix_rag/ --output-format=github

      - name: Run Black formatter check
        run: |
          black --check src/ semantix_rag/

      # npm linting
      - name: Run ESLint on npm package
        working-directory: ./npm-package
        run: |
          npm run lint || true

      # Security checks
      - name: Run Bandit security linter
        run: |
          bandit -r src/ semantix_rag/ -f json -o bandit-report.json || true
          bandit -r src/ semantix_rag/ -ll || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: Run npm audit
        working-directory: ./npm-package
        run: npm audit --audit-level=high || true

  # ========================================
  # Job 2: Build
  # ========================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    outputs:
      python-version: ${{ steps.metadata.outputs.python-version }}
      npm-version: ${{ steps.metadata.outputs.npm-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Extract metadata
        id: metadata
        run: |
          echo "python-version=$(python --version)" >> $GITHUB_OUTPUT
          echo "npm-version=$(node --version)" >> $GITHUB_OUTPUT

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build Python package
        run: |
          python -m build
          twine check dist/*

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/
          retention-days: 7

      - name: Build npm package
        working-directory: ./npm-package
        run: |
          npm pack
          mv *.tgz ../semantix-rag.tgz

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: semantix-rag.tgz
          retention-days: 7

      - name: Generate build metadata
        run: |
          cat > build-info.json << EOF
          {
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "python_version": "${{ steps.metadata.outputs.python-version }}",
            "npm_version": "${{ steps.metadata.outputs.npm-version }}"
          }
          EOF

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.json

  # ========================================
  # Job 3: Unit Tests
  # ========================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=semantix_rag \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage.xml
          flags: unit
          name: codecov-umbrella

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/
            test-results.xml

      - name: Check coverage threshold
        run: |
          coverage=$(coverage report | grep TOTAL | awk '{print $4}' | sed 's/%//')
          if (( $(echo "$coverage < 80" | bc -l) )); then
            echo "❌ Coverage $coverage% is below 80% threshold"
            exit 1
          fi
          echo "✅ Coverage $coverage% meets threshold"

  # ========================================
  # Job 4: Integration Tests
  # ========================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Qdrant
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:6333/health; then
              echo "✅ Qdrant is ready"
              exit 0
            fi
            echo "Waiting for Qdrant... ($i/30)"
            sleep 2
          done
          echo "❌ Qdrant failed to start"
          exit 1

      - name: Run integration tests
        env:
          QDRANT_URL: http://localhost:6333
        run: |
          pytest tests/integration/ \
            --cov=semantix_rag \
            --cov-append \
            --cov-report=xml \
            --junitxml=integration-test-results.xml \
            -v \
            -m integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: integration-test-results.xml

  # ========================================
  # Job 5: E2E Tests (MCP Protocol)
  # ========================================
  test-e2e:
    name: E2E Tests (MCP Protocol)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ \
            --junitxml=e2e-test-results.xml \
            -v \
            -m production

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: e2e-test-results.xml

  # ========================================
  # Job 6: Security Scan
  # ========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Safety check for Python deps
        run: |
          pip install safety
          safety check --json > safety-report.json || true

      - name: Upload Safety report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safety-security-report
          path: safety-report.json

  # ========================================
  # Job 7: Summary & Status
  # ========================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, build, test-unit, test-integration, test-e2e, security]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests | ${{ needs.test-e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.build.result == 'failure' ||
          needs.test-unit.result == 'failure' ||
          needs.test-integration.result == 'failure' ||
          needs.test-e2e.result == 'failure' ||
          needs.security.result == 'failure'
        run: |
          echo "❌ CI Pipeline failed!"
          exit 1

      - name: All checks passed
        if: |
          needs.lint.result == 'success' &&
          needs.build.result == 'success' &&
          needs.test-unit.result == 'success' &&
          needs.test-integration.result == 'success' &&
          needs.test-e2e.result == 'success' &&
          needs.security.result == 'success'
        run: |
          echo "✅ All CI checks passed!"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "All quality gates passed successfully." >> $GITHUB_STEP_SUMMARY
